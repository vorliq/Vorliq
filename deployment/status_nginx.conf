server {
    listen 80;
    server_name status.vorliq.org;

    root /home/vorliq/app/docs;
    index status.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://vorliq.org https://status.vorliq.org" always;

    location / {
        try_files /status.html =404;
    }

    location = /logo.png {
        try_files /logo.png =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
