# Plain HTTP: redirect everything to HTTPS. Public traffic is fronted by
# Cloudflare in Full/Full-strict mode, which already upgrades http->https at
# the edge and reaches this origin only over 443 -- so this redirect never
# loops. It additionally upgrades any request made directly to the origin
# over HTTP (bypassing Cloudflare). The Let's Encrypt http-01 challenge path
# is served in plaintext so certbot --nginx renewal keeps working.
server {
  listen 80;
  server_name vorliq.org www.vorliq.org;

  root /home/vorliq/app/frontend/build;

  location ^~ /.well-known/acme-challenge/ {
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name vorliq.org www.vorliq.org;

  ssl_certificate /etc/letsencrypt/live/vorliq.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/vorliq.org/privkey.pem;

  root /home/vorliq/app/frontend/build;
  index index.html;

  # HSTS over HTTPS only. 180 days, intentionally without includeSubDomains or
  # preload so it stays reversible and does not affect node./status. subdomains.
  # Sent on the TLS server only (an HSTS header over plain HTTP is ignored by UAs).
  add_header Strict-Transport-Security "max-age=15552000" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # nginx owns Permissions-Policy for every response (static and proxied); the
  # backend's copy is hidden below so exactly one header is served, matching
  # the Node app's strict value.
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://formspree.io; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline'; connect-src 'self' https://vorliq.org https://www.vorliq.org https://node.vorliq.org https://status.vorliq.org https://vorliq.github.io https://formspree.io wss://vorliq.org wss://www.vorliq.org http://localhost:* ws://localhost:* http://127.0.0.1:* ws://127.0.0.1:*" always;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  location / {
    try_files $uri /index.html;
  }

  location /static/ {
    expires 7d;
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

}
