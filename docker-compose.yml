services:
  blockchain:
    build:
      context: ./blockchain
    container_name: vorliq-blockchain
    environment:
      VORLIQ_HOST: 0.0.0.0
      VORLIQ_PORT: 5001
      VORLIQ_DATA_DIR: /app/data
      NODE_ENV: production
      # Production mining is always on so the chain keeps producing blocks.
      VORLIQ_MINING_ENABLED: "true"
      # Wallet the in-process fallback miner mines to when no member is mining.
      # Override per deployment; blank leaves the fallback miner idle.
      VORLIQ_SERVER_WALLET_ADDRESS: "${VORLIQ_SERVER_WALLET_ADDRESS:-}"
    ports:
      - "5001:5001"
    volumes:
      - vorliq-data:/app/data
    networks:
      - vorliq-network

  backend:
    build:
      context: ./backend
    container_name: vorliq-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      FLASK_URL: http://blockchain:5001
    depends_on:
      - blockchain
    ports:
      - "5000:5000"
    networks:
      - vorliq-network

  frontend:
    build:
      context: ./frontend
    container_name: vorliq-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - vorliq-network

networks:
  vorliq-network:
    driver: bridge

volumes:
  vorliq-data:
