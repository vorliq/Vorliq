name: Vorliq Deploy

on:
  workflow_run:
    workflows:
      - Vorliq CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/vorliq_deploy_key
          chmod 600 ~/.ssh/vorliq_deploy_key
          test -s ~/.ssh/vorliq_deploy_key
          ssh-keygen -y -f ~/.ssh/vorliq_deploy_key > ~/.ssh/vorliq_deploy_key.pub
          ssh-keygen -lf ~/.ssh/vorliq_deploy_key.pub
          ssh-keyscan -H 159.65.24.177 >> ~/.ssh/known_hosts

      - name: Deploy to production server
        run: |
          ssh -i ~/.ssh/vorliq_deploy_key -o BatchMode=yes -o IdentitiesOnly=yes root@159.65.24.177 <<'EOF'
            set -euo pipefail
            sudo -u vorliq -H git -C /home/vorliq/app fetch origin
            sudo -u vorliq -H git -C /home/vorliq/app reset --hard origin/main
            if ! grep -q 'Environment=NODE_ENV=production' /etc/systemd/system/vorliq-blockchain.service; then
              sed -i '/Environment=VORLIQ_DATA_DIR=/a Environment=NODE_ENV=production' /etc/systemd/system/vorliq-blockchain.service
              systemctl daemon-reload
            fi
            sudo -u vorliq -H bash -lc 'cd /home/vorliq/app/backend && npm install'
            sudo -u vorliq -H bash -lc 'cd /home/vorliq/app/frontend && npm install'
            sudo -u vorliq -H bash -lc 'cd /home/vorliq/app/frontend && npm run build'
            bash -n /home/vorliq/app/deployment/backup.sh
            bash -n /home/vorliq/app/deployment/restore_backup.sh
            bash -n /home/vorliq/app/deployment/verify_backup.sh
            bash -n /home/vorliq/app/deployment/setup_server.sh
            bash -n /home/vorliq/app/deployment/configure_server.sh
            bash -n /home/vorliq/app/deployment/update_server.sh
            chmod -R 755 /home/vorliq/app/frontend/build
            mkdir -p /home/vorliq/backups
            chown -R vorliq:vorliq /home/vorliq/backups
            cp /home/vorliq/app/deployment/backup.sh /home/vorliq/backup.sh
            chmod 750 /home/vorliq/backup.sh
            chown root:vorliq /home/vorliq/backup.sh
            printf '15 2 * * * root /home/vorliq/backup.sh >/dev/null 2>&1\n' >/etc/cron.d/vorliq-backup
            chmod 644 /etc/cron.d/vorliq-backup
            /home/vorliq/backup.sh
            LATEST_BACKUP="$(ls -1t /home/vorliq/backups/vorliq-backup-*.tar.gz 2>/dev/null | head -n1 || true)"
            if [ -n "${LATEST_BACKUP}" ]; then
              DRILL_DIR="$(mktemp -d)"
              cp "${LATEST_BACKUP}" "${DRILL_DIR}/"
              DRILL_ARCHIVE="${DRILL_DIR}/$(basename "${LATEST_BACKUP}")"
              bash /home/vorliq/app/deployment/verify_backup.sh "${DRILL_ARCHIVE}"
              mkdir -p "${DRILL_DIR}/isolated-extract"
              tar -xzf "${DRILL_ARCHIVE}" -C "${DRILL_DIR}/isolated-extract"
              VORLIQ_DATA_DIR="${DRILL_DIR}/isolated-data" bash /home/vorliq/app/deployment/restore_backup.sh "${DRILL_ARCHIVE}" --dry-run
              rm -rf "${DRILL_DIR}"
            else
              echo "No backup archive found for restore drill; backup status endpoint will report this."
            fi
            if [ -f /etc/letsencrypt/live/vorliq.org/fullchain.pem ] && [ -f /etc/letsencrypt/live/vorliq.org/privkey.pem ]; then
              CERT_DOMAIN=vorliq.org
              sed "s#/etc/letsencrypt/live/vorliq.org#/etc/letsencrypt/live/${CERT_DOMAIN}#g" /home/vorliq/app/deployment/vorliq_nginx_ssl.conf > /etc/nginx/sites-available/vorliq
            elif [ -f /etc/letsencrypt/live/status.vorliq.org/fullchain.pem ] && [ -f /etc/letsencrypt/live/status.vorliq.org/privkey.pem ]; then
              CERT_DOMAIN=status.vorliq.org
              sed "s#/etc/letsencrypt/live/vorliq.org#/etc/letsencrypt/live/${CERT_DOMAIN}#g" /home/vorliq/app/deployment/vorliq_nginx_ssl.conf > /etc/nginx/sites-available/vorliq
            else
              cp /home/vorliq/app/deployment/vorliq_nginx.conf /etc/nginx/sites-available/vorliq
            fi
            nginx -t
            systemctl restart vorliq-blockchain vorliq-backend vorliq-heartbeat nginx
            for attempt in 1 2 3 4 5; do
              HEALTH_RESPONSE="$(curl -s http://localhost:5000/api/health || true)"
              if echo "${HEALTH_RESPONSE}" | grep -q '"success":true'; then
                break
              fi
              sleep 3
            done
            echo "${HEALTH_RESPONSE}"
            echo "${HEALTH_RESPONSE}" | grep -q '"success":true'
          EOF

      - name: Print deployment success
        run: echo "Deployment successful for commit ${{ github.event.workflow_run.head_sha }}"
