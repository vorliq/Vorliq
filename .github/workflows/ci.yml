name: Vorliq CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  blockchain-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install blockchain dependencies
        working-directory: blockchain
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Run blockchain test suite
        working-directory: blockchain
        run: .venv/bin/python -m pytest tests/ -v

      # The operational tools (deploy-gate chain diagnostic, forensic
      # reconciliation, chain bootstrap/backup selection) have their own tests
      # in tools/, which `pytest tests/` above does not collect. INCIDENT_267's
      # root-cause fix lives in diagnose_chain_startup.py — run these so that
      # bug class is caught automatically instead of during a deploy.
      - name: Run operational tool tests
        env:
          PYTHONPATH: blockchain:tools
        run: blockchain/.venv/bin/python -m pytest tools/ -v

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend test suite
        working-directory: backend
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend regression tests
        working-directory: frontend
        run: npm test -- --watchAll=false

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  postgres-shadow-migration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vorliq_shadow
          POSTGRES_USER: vorliq_shadow
          POSTGRES_PASSWORD: vorliq_shadow_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vorliq_shadow -d vorliq_shadow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SHADOW_DATABASE_URL: postgresql://vorliq_shadow:vorliq_shadow_password@localhost:5432/vorliq_shadow

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shadow migration dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r blockchain/requirements.txt
          python -m pip install "psycopg[binary]"

      - name: Run PostgreSQL schema check
        run: python tools/postgres_schema_check.py

      - name: Run migration dry run against fixture
        run: python tools/migration_dry_run.py --data-dir tests/fixtures/migration/sample_data --output temp-migration-report.json

      - name: Run PostgreSQL import simulation
        run: python tools/simulate_postgres_import.py --input temp-migration-report.json --output temp-import-simulation.json

      - name: Run PostgreSQL shadow migration
        run: python tools/postgres_shadow_migrate.py --data-dir tests/fixtures/migration/sample_data --database-url "$SHADOW_DATABASE_URL"

      - name: Verify PostgreSQL shadow parity
        run: python tools/postgres_shadow_verify.py --data-dir tests/fixtures/migration/sample_data --database-url "$SHADOW_DATABASE_URL"

      - name: Run PostgreSQL shadow rehearsal with adapter parity
        run: python tools/run_shadow_migration_rehearsal.py --data-dir tests/fixtures/migration/sample_data --database-url "$SHADOW_DATABASE_URL" --check-adapter

      - name: Run PostgreSQL adapter integration tests
        env:
          PYTHONPATH: blockchain:tools
        run: python -m pytest blockchain/tests/test_storage_adapters.py blockchain/tests/test_postgres_shadow_migration.py -v
