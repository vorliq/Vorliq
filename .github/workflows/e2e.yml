name: Vorliq E2E

on:
  workflow_run:
    workflows:
      - Vorliq Deploy
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  production-e2e-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Chromium browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Wait for deployed production commit
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          for attempt in {1..20}; do
            commit="$(node -e "fetch('https://vorliq.org/api/deployment').then(r => r.json()).then(j => process.stdout.write(String(j.commit_hash || ''))).catch(() => process.exit(1))" || true)"
            if [ "$commit" = "$EXPECTED_SHA" ]; then
              echo "Production deployment is serving $commit."
              node tools/check_readiness.js https://vorliq.org --allow-warning
              exit 0
            fi

            echo "Waiting for production deployment $EXPECTED_SHA; current is ${commit:-unavailable} (attempt $attempt/20)."
            sleep 15
          done

          echo "::error title=Production deployment not ready::vorliq.org did not report $EXPECTED_SHA before E2E."
          exit 1

      - name: Run read-only production E2E smoke tests
        working-directory: e2e
        env:
          E2E_BASE_URL: https://vorliq.org
          E2E_WORKERS: "1"
        run: npm run e2e:postdeploy

      - name: Report Playwright failure context
        if: failure()
        working-directory: e2e
        run: |
          python - <<'PY'
          from pathlib import Path

          contexts = list(Path("test-results").glob("**/error-context.md"))
          if not contexts:
              print("::error title=Playwright failure::No Playwright error-context.md files were produced.")
          for path in contexts[:5]:
              text = path.read_text(encoding="utf-8", errors="replace")
              text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::error file={path},title=Playwright failure::{text[:6000]}")
          PY

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
