<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#00A896" />
    <title>Vorliq — Offline</title>
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0e1a;
        color: #e6f0ff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
      }
      .card { max-width: 28rem; text-align: center; }
      .logo { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 18px; }
      h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 10px; }
      p { color: #a9bdd6; line-height: 1.55; margin: 0 0 22px; }
      .accent { color: #00a896; }
      button {
        cursor: pointer; border: none; border-radius: 12px; padding: 12px 22px;
        font-weight: 800; background: #00a896; color: #06101c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/logo.png" alt="Vorliq" />
      <h1>You're <span class="accent">offline</span></h1>
      <p>
        Vorliq can't reach the network right now. Your wallet stays encrypted on this device.
        Reconnect to load your balance and the latest blockchain activity.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
