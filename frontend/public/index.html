<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Vorliq — Your Community's Bank. Your Rules.</title>
    <meta
      name="description"
      content="Vorliq is a community savings bank built on its own blockchain with the VLQ coin. Create a wallet, save together, move VLQ, and verify your community's blockchain activity in real time."
    />
    <link rel="canonical" href="https://vorliq.org/" />

    <!-- Icons: the existing Vorliq logo only -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Apply the saved theme before paint to avoid a flash. The theme-color is
         injected here rather than as a static <meta> so editors/linters don't
         flag the well-known limited browser support (Firefox/Opera ignore it
         harmlessly); injecting keeps the address-bar tint on the browsers that
         do support it. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("vorliq_theme");
          var theme = t === "light" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", theme);
          var meta = document.createElement("meta");
          meta.name = "theme-color";
          meta.content = theme === "light" ? "#00A896" : "#0A0E1A";
          document.head.appendChild(meta);
        } catch (e) {}
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vorliq" />
    <meta property="og:title" content="Vorliq — Your Community's Bank. Your Rules." />
    <meta
      property="og:description"
      content="A community savings bank built on its own blockchain with the VLQ coin. Create a wallet, save together, move VLQ, and verify activity in real time."
    />
    <meta property="og:url" content="https://vorliq.org/" />
    <meta property="og:image" content="https://vorliq.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Vorliq — Your Community's Bank. Your Rules. A community savings bank built on its own blockchain with the VLQ coin." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Vorliq" />
    <meta name="twitter:title" content="Vorliq — Your Community's Bank. Your Rules." />
    <meta
      name="twitter:description"
      content="A community savings bank built on its own blockchain with the VLQ coin."
    />
    <meta name="twitter:image" content="https://vorliq.org/og-image.png" />

    <!-- Structured data: describes Vorliq as a web application for search engines. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Vorliq",
        "url": "https://vorliq.org/",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "description": "Vorliq is a community savings bank built on its own blockchain with the VLQ coin. Create a wallet, save together, move VLQ, and verify activity in real time.",
        "image": "https://vorliq.org/og-image.png",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "publisher": { "@type": "Organization", "name": "Vorliq", "url": "https://vorliq.org/" }
      }
    </script>

    <style>
      #vq-boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0a0e1a;
        z-index: 9999;
      }
      #vq-boot .vq-boot-inner {
        display: grid;
        justify-items: center;
        gap: 16px;
      }
      #vq-boot .vq-boot-ring {
        position: relative;
        width: 84px;
        height: 84px;
        display: grid;
        place-items: center;
      }
      #vq-boot .vq-boot-spin {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        border: 2px solid transparent;
        border-top-color: #00c6a7;
        border-right-color: #86e33b;
        animation: vqBoot 0.9s linear infinite;
      }
      #vq-boot img {
        width: 54px;
        height: 54px;
        object-fit: contain;
      }
      #vq-boot .vq-boot-label {
        color: #a0aec0;
        font: 800 14px/1 -apple-system, "Segoe UI", sans-serif;
        letter-spacing: 0.01em;
      }
      @keyframes vqBoot {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #vq-boot .vq-boot-spin {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="vq-boot">
        <div class="vq-boot-inner">
          <div class="vq-boot-ring">
            <div class="vq-boot-spin"></div>
            <img src="%PUBLIC_URL%/logo.png" alt="Vorliq" width="54" height="54" />
          </div>
          <span class="vq-boot-label">Loading Vorliq</span>
        </div>
      </div>
    </div>
  </body>
</html>
