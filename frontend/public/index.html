<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f0f1a" />
    <meta
      name="description"
      content="Vorliq is a community savings bank built on its own blockchain with the VLQ coin."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Vorliq</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="vq-boot" style="position:fixed;inset:0;display:grid;place-items:center;background:#0A0E1A">
        <div style="display:grid;justify-items:center;gap:16px">
          <div style="position:relative;width:84px;height:84px;display:grid;place-items:center">
            <div style="position:absolute;inset:0;border-radius:999px;border:2px solid transparent;border-top-color:#00C6A7;border-right-color:#86e33b;animation:vqBoot .9s linear infinite"></div>
            <img src="%PUBLIC_URL%/logo.png" alt="Vorliq" width="54" height="54" style="object-fit:contain" />
          </div>
          <span style="color:#A0AEC0;font:800 14px/1 -apple-system,Segoe UI,sans-serif;letter-spacing:.01em">Loading Vorliq</span>
        </div>
      </div>
    </div>
    <style>@keyframes vqBoot{to{transform:rotate(360deg)}}@media (prefers-reduced-motion:reduce){#vq-boot div div{animation:none!important}}</style>
  </body>
</html>
