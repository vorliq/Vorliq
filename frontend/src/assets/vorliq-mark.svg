<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Vorliq mark</title>
  <desc id="desc">A transparent green, cyan, and blue community blockchain mark.</desc>
  <defs>
    <linearGradient id="vorliq-ring" x1="16" y1="10" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86e33b"/>
      <stop offset=".52" stop-color="#18d7c9"/>
      <stop offset="1" stop-color="#1479ff"/>
    </linearGradient>
    <linearGradient id="vorliq-cube" x1="43" y1="47" x2="84" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a6f14c"/>
      <stop offset=".48" stop-color="#18d7c9"/>
      <stop offset="1" stop-color="#0755a5"/>
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.094 0 0 0 0 0.843 0 0 0 0 0.788 0 0 0 .42 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#soft-glow)">
    <path fill="none" stroke="url(#vorliq-ring)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" d="M34 37c8-12 18-18 30-18s22 6 30 18"/>
    <path fill="none" stroke="url(#vorliq-ring)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" d="M22 54c-6 16-3 31 9 45 9 10 20 16 33 18"/>
    <path fill="none" stroke="url(#vorliq-ring)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" d="M106 54c6 16 3 31-9 45-9 10-20 16-33 18"/>
    <circle cx="64" cy="34" r="7" fill="#86e33b"/>
    <circle cx="31" cy="75" r="7" fill="#18d7c9"/>
    <circle cx="97" cy="75" r="7" fill="#1479ff"/>
    <path fill="url(#vorliq-cube)" d="M64 51 88 64 64 77 40 64z"/>
    <path fill="#0bb7aa" d="M40 68 61 80v25L40 92z"/>
    <path fill="#0d5eb8" d="M88 68 67 80v25l21-13z"/>
